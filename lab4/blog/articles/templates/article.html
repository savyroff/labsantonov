<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
</head>
<body class="article">
    <div class="header">
        <img src="https://www.python.org/static/community_logos/python-logo-master-v3-TM.png" alt="Python Logo" />
    </div>

    <div class="content">
        <div class="one-post">
            <h2 class="post-title">{{ post.title }}</h2>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.text }}</p>
        </div>

        <div class="back-link">
            <a href="{% url 'archive' %}">← Все записи</a>
        </div>
    </div>
</body>
</html>
